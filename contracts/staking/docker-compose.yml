version: '3.8'

services:
  # Event Listener Service
  event-listener:
    build:
      context: ./event-listener
      dockerfile: Dockerfile
    container_name: monaliens-event-listener
    restart: unless-stopped
    environment:
      MONGODB_URI: ${MONGODB_URI}
      NODE_ENV: production
      LOG_LEVEL: info

      # Blockchain Configuration
      RPC_URL: ${RPC_URL}
      WS_URL: ${WS_URL}

      # Contract addresses (target contract)
      STAKING_CONTRACT: ${STAKING_CONTRACT}
      NFT_CONTRACT: ${NFT_CONTRACT}

      # Health Check
      ENABLE_HEALTH_CHECK: "true"
      HEALTH_CHECK_PORT: 5554

      # Performance
      EVENT_BATCH_SIZE: 100
      DB_BATCH_SIZE: 50
      STATS_UPDATE_INTERVAL: 60000

      # Monitoring
      VERBOSE_LOGGING: "true"
      ENABLE_ANALYTICS: "true"
      MAX_QUEUE_SIZE: 1000
    ports:
      - "5554:5554"
    volumes:
      - ./event-listener/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5554/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
