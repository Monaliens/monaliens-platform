version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spinwheel_api
    restart: unless-stopped
    env_file: .env
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 500M
