<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/monaliens.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Monaliens NFT Collection"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/monaliens.jpg" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Resource hints for faster loading -->
    <link rel="preconnect" href="https://api.monaliens.xyz" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://ipfs.io" />
    <link rel="dns-prefetch" href="https://gateway.pinata.cloud" />
    <link rel="dns-prefetch" href="https://cloudflare-ipfs.com" />
    
    <!-- Vilane Font -->
    <style>
      @font-face {
        font-family: 'Vilane';
        src: url('%PUBLIC_URL%/fonts/fonnts.com-Vilane_Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Vilane';
        src: url('%PUBLIC_URL%/fonts/fonnts.com-Vilane_Medium.ttf') format('truetype');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Vilane';
        src: url('%PUBLIC_URL%/fonts/fonnts.com-Vilane_Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Vilane';
        src: url('%PUBLIC_URL%/fonts/fonnts.com-Vilane_Light.ttf') format('truetype');
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }
    </style>

    <!-- Theme initialization script - must run before body renders -->
    <script>
      (function() {
        var theme = localStorage.getItem('monaliens-theme');
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <!-- Critical CSS to prevent layout shifts and font flash -->
    <style>
      :root {
        --bg-primary: #f5f5f5;
        --text-primary: #1f2937;
      }
      [data-theme="dark"] {
        --bg-primary: #0a0a0f;
        --text-primary: #f0f0f5;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-display: swap;
        /* Safe area support for iPhone notch/home indicator */
        padding-top: env(safe-area-inset-top);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        /* Prevent bounce scrolling on iOS */
        overscroll-behavior: none;
        /* Prevent text size adjustment on orientation change */
        -webkit-text-size-adjust: 100%;
      }

      /* Prevent styled-components flash */
      #root {
        min-height: 100vh;
      }

      /* Stable font loading */
      .font-stable {
        font-family: system-ui, -apple-system, sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
      }
    </style>
    
    <title>Monaliens</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
