version: '3.8'

services:
  flip-event-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flip-event-api
    restart: unless-stopped
    ports:
      - "3090:3090"
      - "10001:10001"
    env_file:
      - .env
    environment:
      - WS_PORT=10001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3090/api/flips/recent || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
