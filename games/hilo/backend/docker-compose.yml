version: '3.8'

services:
  hilo-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hilo-api
    restart: unless-stopped
    ports:
      - "9595:9595"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9595/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
